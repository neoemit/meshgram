runtime:
  log_level: INFO

# Selects which radio backend the bridge speaks to.
# Override at runtime with MESH_BACKEND.
mesh:
  backend: meshtastic   # or "meshcore"

meshtastic:
  bridge_channel: 1
  node_name_overrides: {}
  # Example:
  # node_name_overrides:
  #   "!1234abcd": "RTR-A"
  connection:
    mode: tcp
    no_nodes: true
    # serial_device: null
    tcp_host: host.docker.internal
    tcp_port: 4403

# Only used when mesh.backend = meshcore.
# MeshCore has no native packet-level reactions and no reply threading;
# the bridge silently drops reaction syncs and reply-id metadata in that mode.
meshcore:
  bridge_channel: 0
  # Map pubkey prefix → display name (similar to meshtastic.node_name_overrides):
  contact_name_overrides: {}
  # Optional fallback for identity-less channel echoes. Keep disabled unless
  # your MeshCore feed omits sender identity and you observe self-echo loops.
  outbound_echo_text_fallback_enabled: false
  outbound_echo_text_fallback_ttl_seconds: 2.0
  connection:
    mode: serial               # serial | tcp | ble
    serial_device: /dev/ttyUSB0
    baudrate: 115200
    tcp_host: localhost
    tcp_port: 5000
    # ble_address: "12:34:56:78:90:AB"
    # ble_pin: "123456"
    auto_reconnect: true

telegram:
  include_captions: true
  sender_prefix_template: "[{display_name}] {message}"
chunking:
  enabled: true
  prefix_template: "({index}/{total}) "
  inter_chunk_delay_ms: 150
  max_chunk_bytes: 160
  broadcast_max_chunk_bytes: 120
  broadcast_min_inter_chunk_delay_ms: 2500
  payload_safety_margin_bytes: 12
  retry_max_attempts: 3
  retry_initial_delay_ms: 500
  retry_backoff_factor: 2.0
  wait_for_ack: true
  ack_timeout_ms: 20000
  abort_on_chunk_failure: true

plugins:
  - name: bridge
    enabled: true
    settings:
      channel: 1
      reply_link_ttl_hours: 24
      reactions_enabled: true
      meshtastic_want_ack: true
      missing_target_policy: fallback_message
      reply_missing_suffix: "(reply target not found)"
      reaction_missing_notice_template: "(reaction target not found)"

  - name: ping_pong
    enabled: true
    settings:
      keyword_responses:
        Ping: "Pong"
        Ack: "Ack"
      # packet_id_only (default): respond to each distinct message ID.
      # sender_keyword_window: also suppress repeated keyword pings per sender.
      response_dedupe_mode: packet_id_only
      channels: [1, 2]

  - name: dm_http_command
    enabled: false
    settings:
      timeout_seconds: 8
      error_message: "Unable to fetch {command}"
      commands:
        BATTERY:
          url: "http://${SOLAR_HOST}/battery/"
          type: "json"
          value: "data.inv1.soc"
          msg: "{value}%"
          auth:
            type: bearer
            token_env: SOLAR_TOKEN
          headers:
            X-Api-Key: "${SOLAR_API_KEY}"
